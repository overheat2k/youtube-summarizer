<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes YouTube Summarizer</title>
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #5a6fd6;
      --bg: #f8f9fc;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #666;
      --border: #e2e4ed;
      --success: #388e3c;
      --error: #d32f2f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header svg { flex-shrink: 0; }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header p {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }
    .body {
      padding: 16px 18px;
    }
    .section {
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
      color: var(--text);
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: var(--card);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.15);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover {
      background: #d0d3dd;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }
    .status-success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }
    .status-error {
      display: block;
      background: #fce4ec;
      color: #c62828;
      border: 1px solid #f8bbd0;
    }
    .status-info {
      display: block;
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #bbdefb;
    }
    .footer {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .footer a {
      color: var(--primary);
      text-decoration: none;
    }
    .usage {
      margin-top: 10px;
      padding: 10px;
      background: #fff8e1;
      border-radius: 8px;
      border: 1px solid #ffe082;
      font-size: 12px;
      line-height: 1.6;
      color: #6d4c41;
    }
    .usage strong {
      display: block;
      margin-bottom: 4px;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
    <div>
      <h1>Hermes YouTube Summarizer</h1>
      <p>一键总结 YouTube 视频</p>
    </div>
  </div>

  <div class="body">
    <div class="section">
      <div class="section-title">Hermes API 配置</div>
      <div style="margin-bottom:8px;">
        <label for="apiUrl">API 地址</label>
        <input type="text" id="apiUrl" placeholder="http://127.0.0.1:8642" />
      </div>
      <div style="margin-bottom:8px;">
        <label for="apiKey">API 密钥</label>
        <input type="password" id="apiKey" placeholder="your-secret-key" />
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" id="saveBtn">保存</button>
        <button class="btn btn-secondary" id="testBtn">测试连接</button>
      </div>
      <div class="status" id="statusMsg"></div>
    </div>

    <div class="usage">
      <strong>📖 使用方法</strong>
      1. 打开任意 YouTube 视频<br>
      2. 点击视频下方的 <strong>「总结」</strong> 按钮<br>
      3. 等待 Hermes 分析完成<br>
      4. 在右侧面板查看详细总结
    </div>
  </div>

  <div class="footer">
    由 <a href="#" id="hermes-link">Hermes Agent</a> 驱动
  </div>

  <script src="popup.js"></script>
</body>
</html>
